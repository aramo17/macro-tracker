<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MacroTracker</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--sf:#1C1C1E;--bd:rgba(255,255,255,0.08);--t1:#F5F5F7;--t2:#98989D;--ac:#0A84FF}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:0}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer;background:var(--ac)}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes ti{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes sp{to{transform:rotate(360deg)}}
.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:100px}
.cd{background:var(--sf);border-radius:16px;padding:20px;margin-bottom:12px}
.ip{background:rgba(255,255,255,0.06);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;color:var(--t1);font-size:16px;width:100%;outline:none;font-family:inherit}
.bt{background:var(--ac);color:#fff;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
.bt:disabled{opacity:.5}
.b2{background:rgba(255,255,255,0.06);color:var(--t1);border:1px solid var(--bd);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.pl{display:inline-flex;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.po{background:var(--ac);color:#fff}.pf{background:rgba(255,255,255,0.06);color:var(--t2)}
.lb{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.3px;text-transform:uppercase;display:block;margin-bottom:6px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:2000;display:flex;align-items:flex-end;justify-content:center}
.mx{background:#1C1C1E;border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:85vh;overflow:auto;padding:8px 24px 40px}
.tb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(28,28,30,.92);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);display:flex;justify-content:space-around;padding:8px 0 28px;border-top:1px solid rgba(255,255,255,.05);z-index:1000}
.tt{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 12px}
.ts{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(52,199,89,.95);color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:600;z-index:3000;animation:ti .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.hd{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,.2);margin:8px auto 16px}
.fb{display:flex;justify-content:space-between;align-items:center;width:100%;padding:12px 0;background:none;border:none;border-bottom:1px solid var(--bd);color:var(--t1);cursor:pointer;text-align:left;font-family:inherit}
.qb{width:40px;height:40px;border-radius:50%;border:1px solid var(--bd);background:rgba(255,255,255,.06);color:var(--t1);font-size:20px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sn{width:20px;height:20px;border:2px solid rgba(255,255,255,.1);border-top:2px solid var(--ac);border-radius:50%;animation:sp .8s linear infinite;display:inline-block}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef,useMemo}=React;
const MC={protein:"#34C759",carbs:"#FF9F0A",fat:"#FF375F",cal:"#0A84FF"};
const MEALS=["Breakfast","Lunch","Dinner","Snacks"];
const EX=[{n:"Running",cpm:11,i:"\u{1F3C3}"},{n:"Walking",cpm:5,i:"\u{1F6B6}"},{n:"Cycling",cpm:9,i:"\u{1F6B4}"},{n:"Swimming",cpm:10,i:"\u{1F3CA}"},{n:"Weights",cpm:7,i:"\u{1F3CB}\uFE0F"},{n:"HIIT",cpm:13,i:"\u26A1"},{n:"Yoga",cpm:4,i:"\u{1F9D8}"},{n:"Jump Rope",cpm:12,i:"\u{1F938}"}];
const CF=[{name:"Chicken Breast",serving:"6 oz",calories:280,protein:52,carbs:0,fat:6},{name:"Brown Rice",serving:"1 cup",calories:216,protein:5,carbs:45,fat:1.8},{name:"Sweet Potato",serving:"1 medium",calories:103,protein:2,carbs:24,fat:0},{name:"Salmon Fillet",serving:"6 oz",calories:350,protein:34,carbs:0,fat:22},{name:"Avocado",serving:"1 whole",calories:322,protein:4,carbs:17,fat:29},{name:"Banana",serving:"1 medium",calories:105,protein:1.3,carbs:27,fat:.4},{name:"Almonds",serving:"1 oz",calories:164,protein:6,carbs:6,fat:14},{name:"Broccoli",serving:"1 cup",calories:55,protein:3.7,carbs:11,fat:.6},{name:"Greek Yogurt",serving:"1 cup",calories:130,protein:22,carbs:8,fat:0},{name:"Steak (sirloin)",serving:"6 oz",calories:320,protein:46,carbs:0,fat:14},{name:"White Rice",serving:"1 cup",calories:206,protein:4.3,carbs:45,fat:.4},{name:"Oatmeal",serving:"1 cup",calories:154,protein:5,carbs:27,fat:2.5},{name:"Peanut Butter",serving:"2 tbsp",calories:190,protein:7,carbs:7,fat:16},{name:"Whey Protein",serving:"1 scoop",calories:120,protein:24,carbs:3,fat:1},{name:"Egg (whole)",serving:"1 large",calories:72,protein:6,carbs:.4,fat:5},{name:"Apple",serving:"1 medium",calories:95,protein:.5,carbs:25,fat:.3},{name:"Pasta",serving:"1 cup",calories:220,protein:8,carbs:43,fat:1.3},{name:"Cottage Cheese",serving:"1 cup",calories:220,protein:25,carbs:8,fat:10},{name:"Olive Oil",serving:"1 tbsp",calories:119,protein:0,carbs:0,fat:14},{name:"Turkey Breast",serving:"4 slices",calories:60,protein:12,carbs:2,fat:.5}];
const AL=[{label:"Seated Job",desc:"Desk/office work, mostly sitting",mult:1.2},{label:"Standing Job",desc:"Retail, teaching, light on feet",mult:1.4},{label:"Active Job",desc:"Construction, warehouse, walking",mult:1.6}];
const td=()=>new Date().toISOString().split("T")[0];
const S={get(k,fb){try{const d=localStorage.getItem("mt_"+k);return d?JSON.parse(d):fb}catch{return fb}},set(k,v){try{localStorage.setItem("mt_"+k,JSON.stringify(v))}catch{}}};
const calcBMR=(w,h,a,s)=>Math.round(10*w*.453592+6.25*h*2.54-5*a+(s==="male"?5:-161));
const calcTDEE=(b,al)=>Math.round(b*AL[al].mult);

const searchAPI=async q=>{if(!q||q.length<2)return[];
try{const r=await fetch("https://world.openfoodfacts.org/cgi/search.pl?search_terms="+encodeURIComponent(q)+"&search_simple=1&action=process&json=1&page_size=8&fields=product_name,nutriments,serving_size,serving_quantity");
const d=await r.json();if(!d.products)return[];
return d.products.filter(p=>p.product_name).map(p=>{const n=p.nutriments||{},sq=parseFloat(p.serving_quantity||100),per=sq/100;
return{name:p.product_name,serving:p.serving_size||sq+"g",calories:Math.round((n["energy-kcal_100g"]||0)*per),protein:Math.round((n.proteins_100g||0)*per),carbs:Math.round((n.carbohydrates_100g||0)*per),fat:Math.round((n.fat_100g||0)*per)}}).filter(f=>f.calories>0)}catch{return[]}};

const lookupBC=async code=>{try{const r=await fetch("https://world.openfoodfacts.org/api/v2/product/"+code+".json");
const d=await r.json();if(d.status!==1||!d.product)return null;const p=d.product,n=p.nutriments||{},sq=parseFloat(p.serving_quantity||100),per=sq/100;
return{name:p.product_name||"Unknown",serving:p.serving_size||"1 serving",calories:Math.round((n["energy-kcal_100g"]||0)*per),protein:Math.round((n.proteins_100g||0)*per),carbs:Math.round((n.carbohydrates_100g||0)*per),fat:Math.round((n.fat_100g||0)*per)}}catch{return null}};

const Donut=({p,c,f,size=120,sw=10})=>{const total=p+c+f,r=(size-sw)/2,ci=2*Math.PI*r,cx=size/2;
if(!total)return React.createElement("div",{style:{position:"relative",width:size,height:size}},React.createElement("svg",{width:size,height:size},React.createElement("circle",{cx:cx,cy:cx,r:r,fill:"none",stroke:"rgba(255,255,255,0.06)",strokeWidth:sw})),React.createElement("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}},React.createElement("span",{style:{fontSize:12,color:"var(--t2)",fontWeight:600}},"NO DATA")));
const pp=p/total,cp=c/total,fp=f/total,g=.008;
return React.createElement("div",{style:{position:"relative",width:size,height:size}},React.createElement("svg",{width:size,height:size,style:{transform:"rotate(-90deg)"}},React.createElement("circle",{cx:cx,cy:cx,r:r,fill:"none",stroke:"rgba(255,255,255,0.06)",strokeWidth:sw}),React.createElement("circle",{cx:cx,cy:cx,r:r,fill:"none",stroke:MC.protein,strokeWidth:sw,strokeDasharray:ci*Math.max(pp-g,0)+" "+ci*(1-Math.max(pp-g,0)),strokeDashoffset:0,strokeLinecap:"round",style:{transition:"all .6s"}}),React.createElement("circle",{cx:cx,cy:cx,r:r,fill:"none",stroke:MC.carbs,strokeWidth:sw,strokeDasharray:ci*Math.max(cp-g,0)+" "+ci*(1-Math.max(cp-g,0)),strokeDashoffset:-ci*pp,strokeLinecap:"round",style:{transition:"all .6s"}}),React.createElement("circle",{cx:cx,cy:cx,r:r,fill:"none",stroke:MC.fat,strokeWidth:sw,strokeDasharray:ci*Math.max(fp-g,0)+" "+ci*(1-Math.max(fp-g,0)),strokeDashoffset:-ci*(pp+cp),strokeLinecap:"round",style:{transition:"all .6s"}})),React.createElement("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}},React.createElement("span",{style:{fontSize:15,fontWeight:800}},"Macros")))};

const Ring=({v,max,size=64,sw=6,color,children})=>{const r=(size-sw)/2,c=2*Math.PI*r,p=Math.min(v/Math.max(max,1),1);
return(<div style={{position:"relative",width:size,height:size}}><svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={sw}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={c} strokeDashoffset={c*(1-p)} strokeLinecap="round" style={{transition:"stroke-dashoffset .6s"}}/></svg><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>{children}</div></div>)};

const Badge=({l,v,co})=>(<div style={{background:co+"15",borderRadius:10,padding:"10px 8px",textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:co}}>{v}</div><div style={{fontSize:10,color:"var(--t2)",fontWeight:600,letterSpacing:".3px",textTransform:"uppercase",marginTop:2}}>{l}</div></div>);

function App(){
const[ready,sr]=useState(false),[tab,sTab]=useState("dashboard"),[profile,sPro]=useState(null);
const[goals,sGoals]=useState({calories:2200,protein:180,carbs:250,fat:70});
const[foodLog,sFL]=useState({}),[acts,sActs]=useState({}),[bodyStats,sBS]=useState([]);
const[modal,sMod]=useState(null),[toast,sToast]=useState(null),[meal,sMeal]=useState("Breakfast");
// KEY FIX: all form state at top level so inputs don't unmount
const[selFood,sSel]=useState(null),[qty,sQty]=useState(1);
const[bc,sBc]=useState(""),[scanRes,sSR]=useState(null),[scanLoad,sSL]=useState(false),[scanErr,sSE]=useState(""),[scanQty,sSQ]=useState(1);
const[srch,sSrch]=useState(""),[apiRes,sAR]=useState([]),[apiLoad,sAL]=useState(false);
const tmr=useRef(null);
const[exF,sEF]=useState({idx:0,dur:30});
const[stF,sStF]=useState({weight:"",bodyFat:"",waist:"",chest:"",arms:""});
const[pF,sPF]=useState({weight:"",hf:"",hi:"",age:"",sex:"male",al:0});
const[cF,sCF]=useState({name:"",serving:"",calories:"",protein:"",carbs:"",fat:""});

const d=td(),df=foodLog[d]||[],da=acts[d]||[];
useEffect(()=>{sPro(S.get("profile",null));sGoals(S.get("goals",{calories:2200,protein:180,carbs:250,fat:70}));sFL(S.get("foodLog",{}));sActs(S.get("activities",{}));sBS(S.get("bodyStats",[]));sr(true);if(!S.get("profile",null))sMod("profile")},[]);

const sv=(k,v,fn)=>{fn(v);S.set(k,v)};
const flash=m=>{sToast(m);setTimeout(()=>sToast(null),2200)};
const totals=useMemo(()=>df.reduce((a,f)=>({calories:a.calories+f.calories,protein:a.protein+f.protein,carbs:a.carbs+f.carbs,fat:a.fat+f.fat}),{calories:0,protein:0,carbs:0,fat:0}),[df]);
const burned=useMemo(()=>da.reduce((a,x)=>a+x.cal,0),[da]);
const net=totals.calories-burned;
const bmr=profile?calcBMR(profile.weight,profile.height,profile.age,profile.sex):null;
const tdee=bmr?calcTDEE(bmr,profile.actLevel):null;

// Debounced search - key fix: only triggers API after 600ms pause
const doSearch=useCallback(q=>{sSrch(q);sSel(null);sQty(1);if(tmr.current)clearTimeout(tmr.current);
if(q.length<2){sAR([]);sAL(false);return}sAL(true);
tmr.current=setTimeout(async()=>{sAR(await searchAPI(q));sAL(false)},600)},[]);

const localF=useMemo(()=>CF.filter(f=>!srch||f.name.toLowerCase().includes(srch.toLowerCase())),[srch]);

const doScan=async code=>{if(!code.trim())return;sSL(true);sSE("");sSR(null);sSQ(1);
try{const r=await lookupBC(code.trim());r?sSR(r):sSE("Product not found.")}catch{sSE("Lookup failed.")}sSL(false)};

const addFood=food=>{if(!food){sSel(null);sQty(1);return}
sv("foodLog",{...foodLog,[d]:[...df,{...food,meal,id:Date.now()}]},sFL);flash("Added "+food.name);
sSel(null);sQty(1);sMod(null);sSR(null);sSrch("");sAR([])};

const rmFood=id=>sv("foodLog",{...foodLog,[d]:df.filter(f=>f.id!==id)},sFL);
const addAct=()=>{const e=EX[exF.idx],c=Math.round(e.cpm*exF.dur);sv("activities",{...acts,[d]:[...da,{name:e.n,icon:e.i,dur:exF.dur,cal:c,id:Date.now()}]},sActs);flash("Logged "+e.n)};
const rmAct=id=>sv("activities",{...acts,[d]:da.filter(a=>a.id!==id)},sActs);
const addStat=()=>{sv("bodyStats",[...bodyStats,{...stF,date:d,id:Date.now()}],sBS);flash("Stats saved");sMod(null);sStF({weight:"",bodyFat:"",waist:"",chest:"",arms:""})};
const savePro=()=>{const h=(parseInt(pF.hf)||0)*12+(parseInt(pF.hi)||0);
const p={weight:parseFloat(pF.weight)||170,height:h||70,age:parseInt(pF.age)||30,sex:pF.sex,actLevel:pF.al};
sv("profile",p,sPro);const b=calcBMR(p.weight,p.height,p.age,p.sex),t=calcTDEE(b,p.actLevel);
sv("goals",{calories:t,protein:Math.round(p.weight*.8),carbs:Math.round(t*.4/4),fat:Math.round(t*.25/9)},sGoals);
sMod(null);flash("Profile saved!")};

if(!ready)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column"}}><div className="sn" style={{width:40,height:40,borderWidth:3}}/></div>);

// Food preview with quantity
const FoodPrev=({food,q,sq,onAdd,onClose})=>{
const f={name:food.name,serving:food.serving,calories:Math.round(food.calories*q),protein:Math.round(food.protein*q),carbs:Math.round(food.carbs*q),fat:Math.round(food.fat*q)};
return(<div className="cd" style={{border:"1px solid rgba(10,132,255,.25)",animation:"fu .3s"}}>
<div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:16,fontWeight:700}}>{food.name}</div><div style={{fontSize:12,color:"var(--t2)"}}>{food.serving} per serving</div></div>
<button onClick={onClose} style={{background:"none",border:"none",color:"var(--t2)",fontSize:20,cursor:"pointer"}}>x</button></div>
<div style={{display:"flex",alignItems:"center",gap:14,justifyContent:"center",margin:"12px 0"}}>
<button className="qb" onClick={()=>sq(Math.max(.5,q-.5))}>-</button>
<div style={{textAlign:"center",minWidth:50}}><div style={{fontSize:24,fontWeight:800}}>{q}</div><div style={{fontSize:10,color:"var(--t2)",fontWeight:600,textTransform:"uppercase"}}>servings</div></div>
<button className="qb" onClick={()=>sq(q+.5)}>+</button></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:14}}>
<Badge l="Cal" v={f.calories} co={MC.cal}/><Badge l="Pro" v={f.protein+"g"} co={MC.protein}/><Badge l="Carbs" v={f.carbs+"g"} co={MC.carbs}/><Badge l="Fat" v={f.fat+"g"} co={MC.fat}/></div>
<div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>{MEALS.map(m=><button key={m} onClick={()=>sMeal(m)} className={"pl "+(meal===m?"po":"pf")}>{m}</button>)}</div>
<button onClick={()=>onAdd(f)} className="bt">Add {q>1?q+" servings ":""}to {meal}</button></div>)};

// Food list renderer
const FoodList=({items,label,onPick})=>(<div style={{marginBottom:12}}>{label&&<div className="lb" style={{marginBottom:8}}>{label}</div>}
<div style={{maxHeight:200,overflow:"auto"}}>{items.map((f,i)=><button key={i} onClick={()=>onPick(f)} className="fb">
<div><div style={{fontSize:13,fontWeight:500}}>{f.name}</div><div style={{fontSize:11,color:"var(--t2)"}}>{f.serving}</div></div>
<div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:MC.cal}}>{f.calories}</div><div style={{fontSize:9,color:"var(--t2)"}}>P:{f.protein} C:{f.carbs} F:{f.fat}</div></div></button>)}</div></div>);

const pick=f=>{sSel(f);sQty(1)};

return(<>
{/* Header */}
<div style={{padding:"56px 24px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div><div style={{fontSize:26,fontWeight:800,letterSpacing:"-1px"}}>{tab==="dashboard"?"Dashboard":tab==="scanner"?"Scanner":tab==="activity"?"Activity":tab==="stats"?"Body":"Goals"}</div>
<div style={{fontSize:12,color:"var(--t2)",marginTop:2}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div></div>
<button onClick={()=>{if(profile)sPF({weight:String(profile.weight),hf:String(Math.floor(profile.height/12)),hi:String(profile.height%12),age:String(profile.age),sex:profile.sex,al:profile.actLevel});sMod("profile")}}
style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#0A84FF,#BF5AF2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,border:"none",color:"#fff",cursor:"pointer"}}>R</button></div>

{/* DASHBOARD */}
{tab==="dashboard"&&<div style={{padding:"0 20px",animation:"fu .3s"}}>
{tdee&&<div className="cd" style={{background:"linear-gradient(135deg,rgba(10,132,255,.12),rgba(191,90,242,.08))",border:"1px solid rgba(10,132,255,.15)"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div><div className="lb" style={{marginBottom:2}}>Daily Energy Expenditure</div><div style={{fontSize:24,fontWeight:800,letterSpacing:"-1px"}}>{tdee} <span style={{fontSize:14,color:"var(--t2)",fontWeight:500}}>cal/day</span></div></div>
<div style={{textAlign:"right"}}><div style={{fontSize:11,color:"var(--t2)"}}>BMR: {bmr} cal</div><div style={{fontSize:11,color:"var(--t2)"}}>{AL[profile.actLevel].label}</div></div></div></div>}

{/* Macro Donut + Summary */}
<div className="cd" style={{display:"flex",alignItems:"center",gap:20,padding:24}}>
<div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
<Donut p={totals.protein} c={totals.carbs} f={totals.fat} size={120} sw={10}/>
<div style={{marginTop:8,textAlign:"center"}}><span style={{fontSize:22,fontWeight:800,color:"var(--ac)"}}>{net}</span>
<span style={{fontSize:11,color:"var(--t2)",fontWeight:600,display:"block",textTransform:"uppercase"}}>Net Cal</span></div></div>
<div style={{flex:1}}><div style={{fontSize:20,fontWeight:700,marginBottom:6}}>Daily Summary</div>
<div style={{fontSize:13,color:"var(--t2)",marginBottom:14}}>{goals.calories-net>0?(goals.calories-net)+" cal remaining":"Goal reached!"}</div>
<div style={{display:"flex",gap:8,marginBottom:10}}>
<div style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"6px 12px",flex:1}}><div style={{fontSize:10,color:"var(--t2)",fontWeight:600}}>EATEN</div><div style={{fontSize:16,fontWeight:700,color:MC.cal}}>{totals.calories}</div></div>
<div style={{background:"rgba(255,255,255,.04)",borderRadius:10,padding:"6px 12px",flex:1}}><div style={{fontSize:10,color:"var(--t2)",fontWeight:600}}>BURNED</div><div style={{fontSize:16,fontWeight:700,color:"#FF375F"}}>{burned}</div></div></div>
