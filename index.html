<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MacroTracker</title>
<meta name="description" content="Track macros, scan barcodes, log activity, and monitor body stats.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#000;--surf:#1C1C1E;--bdr:rgba(255,255,255,0.08);--txt:#F5F5F7;--txt2:#98989D;--acc:#0A84FF;
--pro:#34C759;--carb:#FF9F0A;--fat:#FF375F;--cal:#0A84FF}
body{font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:0}
input[type="range"]{-webkit-appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,0.1);outline:none;width:100%}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer;background:var(--acc)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,20px)}to{opacity:1;transform:translate(-50%,0)}}
.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:100px}
.card{background:var(--surf);border-radius:16px;padding:20px;margin-bottom:12px}
.inp{background:rgba(255,255,255,0.06);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;
color:var(--txt);font-size:16px;width:100%;outline:none;font-family:inherit}
.btn{background:var(--acc);color:#fff;border:none;border-radius:14px;padding:16px;font-size:17px;
font-weight:600;cursor:pointer;width:100%;font-family:inherit}
.btn2{background:rgba(255,255,255,0.06);color:var(--txt);border:1px solid var(--bdr);border-radius:10px;
padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.pill{display:inline-flex;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;
cursor:pointer;border:none;font-family:inherit}
.pill-on{background:var(--acc);color:#fff}
.pill-off{background:rgba(255,255,255,0.06);color:var(--txt2)}
.lbl{font-size:12px;font-weight:600;color:var(--txt2);letter-spacing:0.3px;text-transform:uppercase;
display:block;margin-bottom:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);z-index:2000;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#1C1C1E;border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:85vh;
overflow:auto;padding:8px 24px 40px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
background:rgba(28,28,30,0.92);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
display:flex;justify-content:space-around;padding:8px 0 28px;border-top:1px solid rgba(255,255,255,0.05);z-index:1000}
.tab-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;
cursor:pointer;padding:4px 12px}
.tab-icon{font-size:20px;transition:all 0.3s}
.tab-label{font-size:9px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;transition:all 0.3s}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(52,199,89,0.95);
color:#fff;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:600;z-index:3000;
backdrop-filter:blur(20px);animation:toastIn 0.3s ease;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.handle{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,0.2);margin:8px auto 16px}
.badge{border-radius:10px;padding:10px 8px;text-align:center}
.badge-val{font-size:16px;font-weight:700}
.badge-lbl{font-size:10px;color:var(--txt2);font-weight:600;letter-spacing:0.3px;text-transform:uppercase;margin-top:2px}
.food-btn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 0;
background:none;border:none;border-bottom:1px solid var(--bdr);color:var(--txt);cursor:pointer;
text-align:left;font-family:inherit}
.hidden{display:none}
</style>
</head>
<body>

<div class="app" id="app"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* ── Constants ─────────────────────────────────────────────────── */
const MC = { protein: "#34C759", carbs: "#FF9F0A", fat: "#FF375F", cal: "#0A84FF" };
const MEALS = ["Breakfast", "Lunch", "Dinner", "Snacks"];
const EXERCISES = [
  { n: "Running", cpm: 11, i: "🏃" }, { n: "Walking", cpm: 5, i: "🚶" },
  { n: "Cycling", cpm: 9, i: "🚴" }, { n: "Swimming", cpm: 10, i: "🏊" },
  { n: "Weights", cpm: 7, i: "🏋️" }, { n: "HIIT", cpm: 13, i: "⚡" },
  { n: "Yoga", cpm: 4, i: "🧘" }, { n: "Jump Rope", cpm: 12, i: "🤸" },
];
const COMMON_FOODS = [
  { name: "Chicken Breast (grilled)", serving: "6 oz", calories: 280, protein: 52, carbs: 0, fat: 6 },
  { name: "Brown Rice", serving: "1 cup cooked", calories: 216, protein: 5, carbs: 45, fat: 1.8 },
  { name: "Sweet Potato", serving: "1 medium", calories: 103, protein: 2, carbs: 24, fat: 0 },
  { name: "Salmon Fillet", serving: "6 oz", calories: 350, protein: 34, carbs: 0, fat: 22 },
  { name: "Avocado", serving: "1 whole", calories: 322, protein: 4, carbs: 17, fat: 29 },
  { name: "Banana", serving: "1 medium", calories: 105, protein: 1.3, carbs: 27, fat: 0.4 },
  { name: "Almonds", serving: "1 oz", calories: 164, protein: 6, carbs: 6, fat: 14 },
  { name: "Broccoli", serving: "1 cup", calories: 55, protein: 3.7, carbs: 11, fat: 0.6 },
  { name: "Greek Yogurt", serving: "1 cup", calories: 130, protein: 22, carbs: 8, fat: 0 },
  { name: "Steak (sirloin)", serving: "6 oz", calories: 320, protein: 46, carbs: 0, fat: 14 },
  { name: "White Rice", serving: "1 cup cooked", calories: 206, protein: 4.3, carbs: 45, fat: 0.4 },
  { name: "Oatmeal", serving: "1 cup cooked", calories: 154, protein: 5, carbs: 27, fat: 2.5 },
  { name: "Peanut Butter", serving: "2 tbsp", calories: 190, protein: 7, carbs: 7, fat: 16 },
  { name: "Whey Protein Shake", serving: "1 scoop", calories: 120, protein: 24, carbs: 3, fat: 1 },
  { name: "Egg (whole)", serving: "1 large", calories: 72, protein: 6, carbs: 0.4, fat: 5 },
  { name: "Apple", serving: "1 medium", calories: 95, protein: 0.5, carbs: 25, fat: 0.3 },
  { name: "Pasta (cooked)", serving: "1 cup", calories: 220, protein: 8, carbs: 43, fat: 1.3 },
  { name: "Cottage Cheese", serving: "1 cup", calories: 220, protein: 25, carbs: 8, fat: 10 },
  { name: "Olive Oil", serving: "1 tbsp", calories: 119, protein: 0, carbs: 0, fat: 14 },
  { name: "Turkey Breast", serving: "4 slices", calories: 60, protein: 12, carbs: 2, fat: 0.5 },
];
const ACT_LEVELS = [
  { label: "Seated Job", desc: "Desk/office work, mostly sitting", mult: 1.2 },
  { label: "Standing Job", desc: "Retail, teaching, light on feet", mult: 1.4 },
  { label: "Active Job", desc: "Construction, warehouse, walking", mult: 1.6 },
];
const today = () => new Date().toISOString().split("T")[0];

/* ── Storage (localStorage) ────────────────────────────────────── */
const S = {
  get(k, fb) { try { const d = localStorage.getItem("mt_"+k); return d ? JSON.parse(d) : fb; } catch { return fb; } },
  set(k, v) { try { localStorage.setItem("mt_"+k, JSON.stringify(v)); } catch(e) { console.error(e); } }
};

/* ── BMR (Mifflin-St Jeor) ─────────────────────────────────────── */
const calcBMR = (w_lb, h_in, age, sex) => {
  const w = w_lb * 0.453592, h = h_in * 2.54;
  return Math.round(10 * w + 6.25 * h - 5 * age + (sex === "male" ? 5 : -161));
};
const calcTDEE = (bmr, al) => Math.round(bmr * ACT_LEVELS[al].mult);

/* ── Barcode Lookup (Open Food Facts API) ──────────────────────── */
const lookupBarcode = async (code) => {
  const resp = await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`);
  const data = await resp.json();
  if (data.status !== 1 || !data.product) return null;
  const p = data.product;
  const n = p.nutriments || {};
  return {
    name: p.product_name || p.generic_name || "Unknown Product",
    serving: p.serving_size || p.quantity || "1 serving",
    calories: Math.round(n["energy-kcal_100g"] * (parseFloat(p.serving_quantity || 100) / 100)) || Math.round(n["energy-kcal_100g"] || 0),
    protein: Math.round(n.proteins_100g * (parseFloat(p.serving_quantity || 100) / 100)) || Math.round(n.proteins_100g || 0),
    carbs: Math.round(n.carbohydrates_100g * (parseFloat(p.serving_quantity || 100) / 100)) || Math.round(n.carbohydrates_100g || 0),
    fat: Math.round(n.fat_100g * (parseFloat(p.serving_quantity || 100) / 100)) || Math.round(n.fat_100g || 0),
  };
};

/* ── Ring Component ────────────────────────────────────────────── */
const Ring = ({ v, max, size = 80, sw = 7, color, children }) => {
  const r = (size - sw) / 2, c = 2 * Math.PI * r, p = Math.min(v / Math.max(max, 1), 1);
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={sw} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw}
          strokeDasharray={c} strokeDashoffset={c*(1-p)} strokeLinecap="round"
          style={{ transition: "stroke-dashoffset 0.6s ease" }} />
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column" }}>
        {children}
      </div>
    </div>
  );
};

const Badge = ({ label, value, color }) => (
  <div className="badge" style={{ background: `${color}15` }}>
    <div className="badge-val" style={{ color }}>{value}</div>
    <div className="badge-lbl">{label}</div>
  </div>
);

/* ── Main App ──────────────────────────────────────────────────── */
function App() {
  const [ready, setReady] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [profile, setProfile] = useState(null);
  const [goals, setGoals] = useState({ calories: 2200, protein: 180, carbs: 250, fat: 70 });
  const [foodLog, setFoodLog] = useState({});
  const [activities, setActivities] = useState({});
  const [bodyStats, setBodyStats] = useState([]);
  const [modal, setModal] = useState(null);
  const [meal, setMeal] = useState("Breakfast");
  const [search, setSearch] = useState("");
  const [barcode, setBarcode] = useState("");
  const [scanResult, setScanResult] = useState(null);
  const [scanLoading, setScanLoading] = useState(false);
  const [scanError, setScanError] = useState("");
  const [customFood, setCustomFood] = useState({ name:"", serving:"", calories:0, protein:0, carbs:0, fat:0 });
  const [exForm, setExForm] = useState({ idx: 0, dur: 30 });
  const [statsForm, setStatsForm] = useState({ weight:"", bodyFat:"", waist:"", chest:"", arms:"" });
  const [profileForm, setProfileForm] = useState({ weight:"", height_ft:"", height_in:"", age:"", sex:"male", actLevel: 0 });
  const [toast, setToast] = useState(null);

  const d = today();
  const dayFoods = foodLog[d] || [];
  const dayActs = activities[d] || [];

  useEffect(() => {
    setProfile(S.get("profile", null));
    setGoals(S.get("goals", { calories: 2200, protein: 180, carbs: 250, fat: 70 }));
    setFoodLog(S.get("foodLog", {}));
    setActivities(S.get("activities", {}));
    setBodyStats(S.get("bodyStats", []));
    setReady(true);
    if (!S.get("profile", null)) setModal("profile");
  }, []);

  const save = (key, val, setter) => { setter(val); S.set(key, val); };
  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const totals = dayFoods.reduce((a, f) => ({ calories: a.calories+f.calories, protein: a.protein+f.protein, carbs: a.carbs+f.carbs, fat: a.fat+f.fat }), { calories:0, protein:0, carbs:0, fat:0 });
  const burned = dayActs.reduce((a, x) => a + x.cal, 0);
  const net = totals.calories - burned;
  const bmr = profile ? calcBMR(profile.weight, profile.height, profile.age, profile.sex) : null;
  const tdee = bmr ? calcTDEE(bmr, profile.actLevel) : null;

  /* ── Barcode scan ──────────────────────────────────────────── */
  const doScan = async (code) => {
    if (!code.trim()) return;
    setScanLoading(true); setScanError(""); setScanResult(null);
    try {
      const result = await lookupBarcode(code.trim());
      if (result) setScanResult(result);
      else setScanError("Product not found. Try another barcode or use manual entry.");
    } catch (e) {
      setScanError("Lookup failed. Check your connection and try again.");
    }
    setScanLoading(false);
  };

  /* ── Actions ────────────────────────────────────────────────── */
  const addFood = (food) => {
    const updated = { ...foodLog, [d]: [...dayFoods, { ...food, meal, id: Date.now() }] };
    save("foodLog", updated, setFoodLog); flash(`Added ${food.name}`);
    setModal(null); setScanResult(null); setSearch(""); setBarcode("");
  };
  const removeFood = (id) => { save("foodLog", { ...foodLog, [d]: dayFoods.filter(f => f.id !== id) }, setFoodLog); };
  const addActivity = () => {
    const ex = EXERCISES[exForm.idx];
    const cal = Math.round(ex.cpm * exForm.dur);
    save("activities", { ...activities, [d]: [...dayActs, { name: ex.n, icon: ex.i, dur: exForm.dur, cal, id: Date.now() }] }, setActivities);
    flash(`Logged ${ex.n}`);
  };
  const removeAct = (id) => { save("activities", { ...activities, [d]: dayActs.filter(a => a.id !== id) }, setActivities); };
  const addBodyStat = () => {
    const updated = [...bodyStats, { ...statsForm, date: d, id: Date.now() }];
    save("bodyStats", updated, setBodyStats); flash("Stats saved");
    setModal(null); setStatsForm({ weight:"", bodyFat:"", waist:"", chest:"", arms:"" });
  };
  const saveProfileForm = () => {
    const h = (parseInt(profileForm.height_ft)||0)*12 + (parseInt(profileForm.height_in)||0);
    const p = { weight: parseFloat(profileForm.weight)||170, height: h||70, age: parseInt(profileForm.age)||30, sex: profileForm.sex, actLevel: profileForm.actLevel };
    save("profile", p, setProfile);
    const b = calcBMR(p.weight, p.height, p.age, p.sex);
    const t = calcTDEE(b, p.actLevel);
    save("goals", { calories: t, protein: Math.round(p.weight * 0.8), carbs: Math.round(t * 0.4 / 4), fat: Math.round(t * 0.25 / 9) }, setGoals);
    setModal(null); flash("Profile saved! Goals auto-calculated.");
  };

  const filtered = COMMON_FOODS.filter(f => f.name.toLowerCase().includes(search.toLowerCase()));

  if (!ready) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column"}}><div style={{fontSize:40,marginBottom:12}}>◉</div><div style={{fontSize:18,fontWeight:600}}>Loading...</div></div>;

  /* ── Dashboard ──────────────────────────────────────────────── */
  const Dashboard = () => (
    <div style={{padding:"0 20px",animation:"fadeUp 0.3s ease"}}>
      {tdee && (
        <div className="card" style={{background:"linear-gradient(135deg, rgba(10,132,255,0.12), rgba(191,90,242,0.08))",border:"1px solid rgba(10,132,255,0.15)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div className="lbl" style={{marginBottom:2}}>Daily Energy Expenditure</div>
              <div style={{fontSize:24,fontWeight:800,letterSpacing:"-1px"}}>{tdee} <span style={{fontSize:14,color:"var(--txt2)",fontWeight:500}}>cal/day</span></div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:"var(--txt2)"}}>BMR: {bmr} cal</div>
              <div style={{fontSize:11,color:"var(--txt2)"}}>{ACT_LEVELS[profile.actLevel].label}</div>
            </div>
          </div>
        </div>
      )}
      <div className="card" style={{display:"flex",alignItems:"center",gap:20,padding:24}}>
        <Ring v={net} max={goals.calories} size={110} sw={9} color={MC.cal}>
          <span style={{fontSize:24,fontWeight:700,letterSpacing:"-1px"}}>{net}</span>
          <span style={{fontSize:9,color:"var(--txt2)",fontWeight:600,letterSpacing:"0.5px",textTransform:"uppercase"}}>NET CAL</span>
        </Ring>
        <div style={{flex:1}}>
          <div style={{fontSize:20,fontWeight:700,letterSpacing:"-0.5px",marginBottom:4}}>Daily Summary</div>
          <div style={{fontSize:13,color:"var(--txt2)",marginBottom:14}}>
            {goals.calories - net > 0 ? `${goals.calories - net} cal remaining` : "Goal reached! 🎯"}
          </div>
          <div style={{display:"flex",gap:8}}>
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"6px 12px",flex:1}}>
              <div style={{fontSize:10,color:"var(--txt2)",fontWeight:600}}>EATEN</div>
              <div style={{fontSize:16,fontWeight:700,color:MC.cal}}>{totals.calories}</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"6px 12px",flex:1}}>
              <div style={{fontSize:10,color:"var(--txt2)",fontWeight:600}}>BURNED</div>
              <div style={{fontSize:16,fontWeight:700,color:"#FF375F"}}>{burned}</div>
            </div>
          </div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
        {[{k:"protein",l:"Protein"},{k:"carbs",l:"Carbs"},{k:"fat",l:"Fat"}].map(m=>(
          <div key={m.k} className="card" style={{display:"flex",flexDirection:"column",alignItems:"center",padding:16}}>
            <Ring v={totals[m.k]} max={goals[m.k]} size={64} sw={6} color={MC[m.k]}>
              <span style={{fontSize:16,fontWeight:700}}>{Math.round(totals[m.k])}</span>
            </Ring>
            <span style={{fontSize:10,color:"var(--txt2)",fontWeight:600,marginTop:6,letterSpacing:"0.3px",textTransform:"uppercase"}}>{m.l}</span>
            <span style={{fontSize:10,color:"var(--txt2)"}}>{Math.round(totals[m.k])}/{goals[m.k]}g</span>
          </div>
        ))}
      </div>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{fontSize:18,fontWeight:700}}>Meals</span>
          <button className="btn2" onClick={()=>setModal("food")}>+ Add Food</button>
        </div>
        {MEALS.map(m=>{
          const mf=dayFoods.filter(f=>f.meal===m), mc=mf.reduce((a,f)=>a+f.calories,0);
          return(
            <div key={m} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--bdr)"}}>
                <span style={{fontSize:14,fontWeight:600}}>{m}</span>
                <span style={{fontSize:12,color:"var(--txt2)"}}>{mc} cal</span>
              </div>
              {mf.map(f=>(
                <div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0 8px 12px"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:500}}>{f.name}</div>
                    <div style={{fontSize:11,color:"var(--txt2)"}}>{f.serving} · P:{f.protein}g C:{f.carbs}g F:{f.fat}g</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:13,fontWeight:600,color:MC.cal}}>{f.calories}</span>
                    <button onClick={()=>removeFood(f.id)} style={{background:"none",border:"none",color:"#FF375F",fontSize:16,cursor:"pointer"}}>×</button>
                  </div>
                </div>
              ))}
              {mf.length===0&&<div style={{padding:"8px 12px",fontSize:12,color:"rgba(255,255,255,0.15)",fontStyle:"italic"}}>No items</div>}
            </div>
          );
        })}
      </div>
      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{fontSize:18,fontWeight:700}}>Activity</span>
          <button className="btn2" onClick={()=>setTab("activity")}>+ Log</button>
        </div>
        {dayActs.length===0&&<div style={{fontSize:12,color:"rgba(255,255,255,0.15)",fontStyle:"italic"}}>No activities today</div>}
        {dayActs.map(a=>(
          <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--bdr)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:22}}>{a.icon}</span>
              <div><div style={{fontSize:13,fontWeight:500}}>{a.name}</div><div style={{fontSize:11,color:"var(--txt2)"}}>{a.dur} min</div></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,fontWeight:600,color:"#FF375F"}}>-{a.cal}</span>
              <button onClick={()=>removeAct(a.id)} style={{background:"none",border:"none",color:"#FF375F",fontSize:16,cursor:"pointer"}}>×</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

      {modal==="profile"&&<ProfileModal />}
      <div className="tab-bar">
        {[{id:"dashboard",icon:"◉",l:"Home"},{id:"scanner",icon:"⊞",l:"Scan"},{id:"activity",icon:"↯",l:"Activity"},{id:"stats",icon:"◎",l:"Body"},{id:"goals",icon:"⚙",l:"Goals"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className="tab-btn">
            <span className="tab-icon" style={{opacity:tab===t.id?1:0.4}}>{t.icon}</span>
            <span className="tab-label" style={{color:tab===t.id?"var(--acc)":"var(--txt2)"}}>{t.l}</span>
          </button>
        ))}
      </div>
      {toast&&<div className="toast">{toast}</div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
